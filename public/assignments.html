<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas — SMPIT Al-Fityan 8B Ahmad bin Hambal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2)
        }

        .dark .glass {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.1)
        }

        .card-hover {
            transition: all .3s cubic-bezier(.4, 0, .2, 1)
        }

        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, .15)
        }
    </style>
</head>

<body class="font-sans bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-blue-600 to-cyan-500 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-white/20 flex items-center justify-center text-white font-bold">AF
                </div>
                <span class="text-white font-bold">Al-Fityan 8B</span>
            </a>
            <div class="hidden md:flex items-center gap-5 text-white/90 text-sm font-medium">
                <a href="/" class="hover:text-white transition-colors">Beranda</a>
                <a href="/assignments.html" class="text-white font-bold border-b-2 border-white pb-0.5">Tugas</a>
                <a href="/grades.html" class="hover:text-white transition-colors">Nilai</a>
                <a href="/chat.html" class="hover:text-white transition-colors">Chat</a>
                <a href="/forum.html" class="hover:text-white transition-colors">Forum</a>
                <a href="/cyber-hub.html" class="hover:text-white transition-colors">Cyber Hub</a>
            </div>
            <button id="darkToggle"
                class="w-9 h-9 rounded-xl bg-white/20 text-white flex items-center justify-center hover:scale-110 transition-transform">
                <i class="fa-solid fa-moon dark:hidden"></i><i class="fa-solid fa-sun hidden dark:inline"></i>
            </button>
        </div>
    </nav>

    <div class="pt-24 pb-16 px-4 max-w-7xl mx-auto">
        <div class="mb-10">
            <h1 class="text-4xl font-black text-gray-900 dark:text-white mb-2">📚 Daftar Tugas</h1>
            <p class="text-gray-500 dark:text-gray-400">Semua tugas kelas 8B Ahmad bin Hambal — pantau deadline dengan
                bijak!</p>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-3 mb-8" id="subjectFilters">
            <button onclick="filterSubject('all')"
                class="filter-btn active px-4 py-2 rounded-xl text-sm font-semibold transition-all bg-blue-500 text-white"
                data-subject="all">Semua</button>
        </div>

        <div id="assignmentsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-16 text-gray-400"><i
                    class="fa-solid fa-spinner fa-spin text-3xl mb-3 block"></i>Memuat tugas...</div>
        </div>
    </div>

    <script>
        // Dark mode
        const root = document.documentElement;
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme:dark)').matches)) root.classList.add('dark');
        document.getElementById('darkToggle').addEventListener('click', () => { root.classList.toggle('dark'); localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light') });

        const subjectColors = {
            'Matematika': 'from-blue-400 to-blue-600',
            'Bahasa Indonesia': 'from-red-400 to-red-600',
            'IPA': 'from-green-400 to-emerald-600',
            'IPS': 'from-amber-400 to-orange-500',
            'Bahasa Inggris': 'from-purple-400 to-purple-600',
            'TIK': 'from-cyan-400 to-teal-600',
            'PAI': 'from-teal-400 to-green-600',
            'Seni Budaya': 'from-pink-400 to-rose-600',
        };
        const defaultColor = 'from-gray-400 to-gray-600';

        let all = [];
        let activeSubject = 'all';

        function daysLeft(due) {
            if (!due) return null;
            const diff = Math.ceil((new Date(due) - new Date()) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function deadlineBadge(due) {
            if (!due) return '';
            const d = daysLeft(due);
            const label = due;
            if (d < 0) return `<span class="px-2 py-1 rounded-full text-xs font-bold bg-gray-200 dark:bg-gray-700 text-gray-500">Selesai</span>`;
            if (d === 0) return `<span class="px-2 py-1 rounded-full text-xs font-bold bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 animate-pulse">Hari ini!</span>`;
            if (d <= 3) return `<span class="px-2 py-1 rounded-full text-xs font-bold bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400">${d} hari lagi ⚠️</span>`;
            return `<span class="px-2 py-1 rounded-full text-xs font-bold bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400">${d} hari lagi</span>`;
        }

        function render() {
            const data = activeSubject === 'all' ? all : all.filter(a => a.subject === activeSubject);
            if (!data.length) {
                document.getElementById('assignmentsGrid').innerHTML = '<div class="col-span-full text-center py-16 text-gray-400">Tidak ada tugas ditemukan.</div>';
                return;
            }
            document.getElementById('assignmentsGrid').innerHTML = data.map(a => `
      <div class="card-hover bg-white dark:bg-gray-900 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
        <div class="h-2 bg-gradient-to-r ${subjectColors[a.subject] || defaultColor}"></div>
        <div class="p-6">
          <div class="flex items-start justify-between gap-2 mb-3">
            <span class="px-3 py-1 rounded-full text-xs font-semibold bg-gradient-to-r ${subjectColors[a.subject] || defaultColor} text-white">${a.subject}</span>
            ${deadlineBadge(a.due_date)}
          </div>
          <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">${a.title}</h3>
          <p class="text-gray-500 dark:text-gray-400 text-sm mb-4 line-clamp-2">${a.description || 'Tidak ada deskripsi.'}</p>
          <div class="flex items-center gap-2 text-gray-400 text-xs">
            <i class="fa-regular fa-calendar"></i>
            <span>Deadline: <strong class="text-gray-600 dark:text-gray-300">${a.due_date || 'Tidak ada'}</strong></span>
          </div>
        </div>
      </div>
    `).join('');
        }

        function filterSubject(subj) {
            activeSubject = subj;
            document.querySelectorAll('.filter-btn').forEach(b => {
                const isActive = b.dataset.subject === subj;
                b.className = `filter-btn px-4 py-2 rounded-xl text-sm font-semibold transition-all ${isActive ? 'bg-blue-500 text-white' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700'}`;
            });
            render();
        }

        async function load() {
            const r = await fetch('/api/assignments');
            all = await r.json();
            const subjects = [...new Set(all.map(a => a.subject))];
            const filterBar = document.getElementById('subjectFilters');
            subjects.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn px-4 py-2 rounded-xl text-sm font-semibold transition-all bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700';
                btn.dataset.subject = s;
                btn.textContent = s;
                btn.onclick = () => filterSubject(s);
                filterBar.appendChild(btn);
            });
            render();
        }
        load();
    </script>
</body>

</html>
