<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nilai — SMPIT Al-Fityan 8B Ahmad bin Hambal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        .card-hover {
            transition: all .3s cubic-bezier(.4, 0, .2, 1)
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, .12)
        }

        .score-ring {
            background: conic-gradient(var(--color) calc(var(--pct)*3.6deg), #e5e7eb calc(var(--pct)*3.6deg))
        }

        .dark .score-ring {
            background: conic-gradient(var(--color) calc(var(--pct)*3.6deg), #374151 calc(var(--pct)*3.6deg))
        }
    </style>
</head>

<body class="font-sans bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-green-500 to-emerald-600 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-white/20 flex items-center justify-center text-white font-bold">AF
                </div>
                <span class="text-white font-bold">Al-Fityan 8B</span>
            </a>
            <div class="hidden md:flex items-center gap-5 text-white/90 text-sm font-medium">
                <a href="/" class="hover:text-white transition-colors">Beranda</a>
                <a href="/assignments.html" class="hover:text-white transition-colors">Tugas</a>
                <a href="/grades.html" class="text-white font-bold border-b-2 border-white pb-0.5">Nilai</a>
                <a href="/chat.html" class="hover:text-white transition-colors">Chat</a>
                <a href="/forum.html" class="hover:text-white transition-colors">Forum</a>
                <a href="/cyber-hub.html" class="hover:text-white transition-colors">Cyber Hub</a>
            </div>
            <button id="darkToggle"
                class="w-9 h-9 rounded-xl bg-white/20 text-white flex items-center justify-center hover:scale-110 transition-transform">
                <i class="fa-solid fa-moon dark:hidden"></i><i class="fa-solid fa-sun hidden dark:inline"></i>
            </button>
        </div>
    </nav>

    <div class="pt-24 pb-16 px-4 max-w-7xl mx-auto">
        <div class="mb-8">
            <h1 class="text-4xl font-black text-gray-900 dark:text-white mb-2">📊 Nilai & Poin</h1>
            <p class="text-gray-500 dark:text-gray-400">Cari namamu untuk melihat nilai dan poin yang sudah kamu
                kumpulkan!</p>
        </div>

        <!-- Search -->
        <div class="relative mb-8 max-w-lg">
            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input id="searchInput" type="text" placeholder="Cari nama atau NIS siswa..."
                class="w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-green-400 text-sm shadow-sm" />
            <button id="searchBtn"
                class="absolute right-3 top-1/2 -translate-y-1/2 px-4 py-2 bg-green-500 text-white rounded-xl text-sm font-semibold hover:bg-green-600 transition-colors">Cari</button>
        </div>

        <!-- Student list -->
        <div id="studentList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
            <div class="col-span-full text-center py-12 text-gray-400 text-sm">Ketik nama atau NIS untuk mencari siswa.
            </div>
        </div>

        <!-- Grade detail panel -->
        <div id="gradePanel" class="hidden">
            <div class="flex items-center gap-3 mb-6">
                <button
                    onclick="document.getElementById('gradePanel').classList.add('hidden');document.getElementById('studentList').classList.remove('hidden');"
                    class="p-2 rounded-xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700">
                    <i class="fa-solid fa-arrow-left text-gray-600 dark:text-gray-300"></i>
                </button>
                <h2 id="selectedStudentName" class="text-2xl font-bold dark:text-white"></h2>
            </div>

            <!-- Points card -->
            <div id="pointsCard"
                class="p-6 rounded-3xl bg-gradient-to-br from-purple-500 to-pink-500 text-white mb-6 shadow-xl flex items-center gap-6">
                <div class="text-6xl">🏆</div>
                <div>
                    <div class="text-white/80 text-sm">Total Poin</div>
                    <div id="totalPoints" class="text-5xl font-black">0</div>
                    <div class="text-white/80 text-sm mt-1">Kumpulkan lebih banyak poin dengan nilai bagus!</div>
                </div>
            </div>

            <div id="gradesGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme:dark)').matches)) root.classList.add('dark');
        document.getElementById('darkToggle').addEventListener('click', () => { root.classList.toggle('dark'); localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light') });

        const subjectColors = { 'Matematika': '#3b82f6', 'Bahasa Indonesia': '#ef4444', 'IPA': '#10b981', 'IPS': '#f59e0b', 'Bahasa Inggris': '#8b5cf6', 'TIK': '#06b6d4' };

        function scoreColor(s) { return s >= 90 ? '#10b981' : s >= 80 ? '#3b82f6' : s >= 70 ? '#f59e0b' : s >= 60 ? '#f97316' : '#ef4444'; }
        function scoreLabel(s) { return s >= 90 ? 'Sangat Baik' : s >= 80 ? 'Baik' : s >= 70 ? 'Cukup' : s >= 60 ? 'Perlu Belajar' : 'Kurang'; }

        async function searchStudents() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) { document.getElementById('studentList').innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 text-sm">Ketik nama atau NIS untuk mencari siswa.</div>'; return; }
            const r = await fetch(`/api/students?q=${encodeURIComponent(q)}`);
            const students = await r.json();
            if (!students.length) {
                document.getElementById('studentList').innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 text-sm">Tidak ada siswa ditemukan.</div>';
                return;
            }
            document.getElementById('studentList').innerHTML = students.map(s => `
      <div onclick="showGrades(${s.id},'${s.name}',${s.points},'${s.avatar_color}')"
           class="card-hover cursor-pointer p-5 bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 shadow-sm flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-sm flex-shrink-0" style="background:${s.avatar_color}">${s.name.split(' ').map(n => n[0]).join('').substring(0, 2)}</div>
        <div class="flex-1 min-w-0">
          <div class="font-bold dark:text-white truncate">${s.name}</div>
          <div class="text-gray-500 text-sm">NIS: ${s.nis} · ${s.class}</div>
        </div>
        <div class="text-right">
          <div class="text-xl font-black text-purple-600 dark:text-purple-400">${s.points}</div>
          <div class="text-gray-400 text-xs">poin</div>
        </div>
        <i class="fa-solid fa-chevron-right text-gray-300"></i>
      </div>
    `).join('');
        }

        async function showGrades(id, name, points, color) {
            document.getElementById('studentList').classList.add('hidden');
            document.getElementById('gradePanel').classList.remove('hidden');
            document.getElementById('selectedStudentName').innerHTML = `<span style="color:${color}">${name}</span>`;
            document.getElementById('totalPoints').textContent = points.toLocaleString();

            const r = await fetch(`/api/grades/${id}`);
            const grades = await r.json();
            if (!grades.length) {
                document.getElementById('gradesGrid').innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">Belum ada nilai yang diinput.</div>';
                return;
            }
            document.getElementById('gradesGrid').innerHTML = grades.map(g => `
      <div class="card-hover bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 p-5 shadow-sm">
        <div class="flex items-start justify-between mb-3">
          <div>
            <span class="px-2 py-0.5 rounded-full text-xs font-semibold text-white" style="background:${subjectColors[g.subject] || '#6366f1'}">${g.subject}</span>
            <h4 class="font-bold dark:text-white mt-1 text-sm">${g.assignment_title}</h4>
          </div>
          <div class="text-center">
            <div class="w-14 h-14 rounded-full flex items-center justify-center text-white font-black text-lg shadow-lg" style="background:${scoreColor(g.score)}">${g.score}</div>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-xs font-semibold px-2 py-1 rounded-full" style="background:${scoreColor(g.score)}20;color:${scoreColor(g.score)}">${scoreLabel(g.score)}</span>
          <span class="text-purple-600 dark:text-purple-400 font-bold text-sm">+${g.points_awarded} poin ⭐</span>
        </div>
      </div>
    `).join('');
        }

        document.getElementById('searchBtn').addEventListener('click', searchStudents);
        document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') searchStudents(); });
    </script>
</body>

</html>
