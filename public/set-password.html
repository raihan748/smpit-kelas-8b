<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atur Password Baru — SMPIT Al-Fityan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #064e3b 0%, #065f46 30%, #047857 60%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
            outline: none;
            transition: all .3s;
            box-sizing: border-box;
        }

        .input-field:focus {
            border-color: #6ee7b7;
            box-shadow: 0 0 0 3px rgba(110, 231, 183, 0.2);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .input-pr {
            padding-right: 48px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, #10b981, #0d9488);
            color: white;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .blob {
            position: absolute;
            border-radius: 9999px;
            filter: blur(60px);
            pointer-events: none;
        }

        .label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }

        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: color .2s;
            padding: 4px;
        }

        .toggle-pass:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .err-msg {
            color: #f87171;
            font-size: 12px;
            margin-bottom: 12px;
            padding: 0 4px;
            display: none;
        }

        .strength-bar {
            height: 6px;
            border-radius: 9999px;
            transition: width .4s ease, background-color .4s ease;
        }

        .req-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            transition: color .3s;
        }

        .req-item.met {
            color: #6ee7b7;
        }

        .spin {
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-14px);
            }
        }

        .animate-fadein {
            animation: fadeInUp .6s ease both;
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <!-- Floating blobs -->
    <div class="blob animate-float"
        style="width:260px;height:260px;background:rgba(52,211,153,0.2);top:40px;right:40px"></div>
    <div class="blob animate-float"
        style="width:320px;height:320px;background:rgba(20,184,166,0.15);bottom:40px;left:40px;animation-delay:2s">
    </div>

    <div class="animate-fadein" style="position:relative;z-index:10;width:100%;max-width:420px;margin:0 16px">

        <div class="glass" style="border-radius:24px;padding:32px;box-shadow:0 25px 50px rgba(0,0,0,0.4)">
            <!-- Header -->
            <div style="text-align:center;margin-bottom:24px">
                <div
                    style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#34d399,#0d9488);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 8px 24px rgba(16,185,129,0.4)">
                    🔑</div>
                <h1 style="color:white;font-size:22px;font-weight:900;margin:0">Buat Password Baru</h1>
                <p style="color:rgba(255,255,255,0.5);font-size:13px;margin-top:4px">Wajib dilakukan sebelum mengakses
                    admin panel</p>
            </div>

            <!-- Info banner -->
            <div
                style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);border-radius:14px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:20px">
                <i class="fa-solid fa-circle-info" style="color:#34d399;margin-top:1px;flex-shrink:0"></i>
                <p style="color:rgba(167,243,208,0.85);font-size:12px;margin:0;line-height:1.6">Ini adalah login
                    pertamamu. Silakan buat password baru yang kuat. Password wajib minimal <strong
                        style="color:#a7f3d0">8 karakter</strong>.</p>
            </div>

            <!-- New Password -->
            <label class="label">Password Baru</label>
            <div style="position:relative;margin-bottom:8px">
                <input id="newPass" type="password" placeholder="Minimal 8 karakter..." class="input-field input-pr" />
                <button type="button" id="toggleNew" class="toggle-pass" aria-label="Tampilkan password">
                    <i id="toggleNewIcon" class="fa-regular fa-eye"></i>
                </button>
            </div>

            <!-- Strength meter -->
            <div style="margin-bottom:10px">
                <div style="background:rgba(255,255,255,0.1);border-radius:9999px;overflow:hidden;height:6px">
                    <div id="strengthBar" class="strength-bar" style="width:0%;background:#ef4444"></div>
                </div>
                <div style="display:flex;justify-content:space-between;margin-top:5px">
                    <span id="strengthLabel" style="font-size:11px;color:rgba(255,255,255,0.5)">Belum diisi</span>
                </div>
            </div>

            <!-- Requirements checklist -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:18px">
                <div class="req-item" id="req-len"><i class="fa-solid fa-circle-xmark"
                        style="color:#f87171;font-size:11px"></i> Min 8 karakter</div>
                <div class="req-item" id="req-upper"><i class="fa-solid fa-circle-xmark"
                        style="color:#f87171;font-size:11px"></i> Huruf besar</div>
                <div class="req-item" id="req-lower"><i class="fa-solid fa-circle-xmark"
                        style="color:#f87171;font-size:11px"></i> Huruf kecil</div>
                <div class="req-item" id="req-num"><i class="fa-solid fa-circle-xmark"
                        style="color:#f87171;font-size:11px"></i> Angka</div>
            </div>

            <!-- Confirm Password -->
            <label class="label">Konfirmasi Password</label>
            <div style="position:relative;margin-bottom:18px">
                <input id="confirmPass" type="password" placeholder="Ulangi password..." class="input-field input-pr" />
                <button type="button" id="toggleConfirm" class="toggle-pass" aria-label="Tampilkan konfirmasi">
                    <i id="toggleConfirmIcon" class="fa-regular fa-eye"></i>
                </button>
            </div>

            <p id="formErr" class="err-msg"></p>

            <button id="saveBtn" class="btn-primary">
                <i class="fa-solid fa-check" style="margin-right:8px"></i>Simpan Password &amp; Masuk
            </button>
        </div>

        <p style="text-align:center;color:rgba(255,255,255,0.25);font-size:11px;margin-top:20px">SMPIT Al-Fityan ©
            2025/2026</p>
    </div>

    <script>
        // ── Password visibility toggles ───────────────────────────────────────────
        function makeToggle(btnId, inputId, iconId) {
            document.getElementById(btnId).addEventListener('click', () => {
                const input = document.getElementById(inputId);
                const icon = document.getElementById(iconId);
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'fa-regular fa-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'fa-regular fa-eye';
                }
            });
        }
        makeToggle('toggleNew', 'newPass', 'toggleNewIcon');
        makeToggle('toggleConfirm', 'confirmPass', 'toggleConfirmIcon');

        // ── Strength checker ──────────────────────────────────────────────────────
        const reqs = [
            { id: 'req-len', test: v => v.length >= 8 },
            { id: 'req-upper', test: v => /[A-Z]/.test(v) },
            { id: 'req-lower', test: v => /[a-z]/.test(v) },
            { id: 'req-num', test: v => /[0-9]/.test(v) },
        ];
        const strengthColors = ['#ef4444', '#f97316', '#eab308', '#3b82f6', '#10b981'];
        const strengthLabels = ['Sangat Lemah', 'Lemah', 'Sedang', 'Kuat', 'Sangat Kuat'];

        document.getElementById('newPass').addEventListener('input', function () {
            const val = this.value;
            let score = 0;

            reqs.forEach(r => {
                const el = document.getElementById(r.id);
                const icon = el.querySelector('i');
                const passed = r.test(val);
                if (passed) {
                    score++;
                    icon.className = 'fa-solid fa-circle-check';
                    icon.style.color = '#34d399';
                    el.classList.add('met');
                } else {
                    icon.className = 'fa-solid fa-circle-xmark';
                    icon.style.color = '#f87171';
                    el.classList.remove('met');
                }
            });

            const bar = document.getElementById('strengthBar');
            bar.style.width = ((score / 4) * 100) + '%';
            bar.style.backgroundColor = strengthColors[score] || '#ef4444';
            document.getElementById('strengthLabel').textContent = val ? (strengthLabels[score] || 'Sangat Lemah') : 'Belum diisi';
        });

        // ── Save password ─────────────────────────────────────────────────────────
        async function savePassword() {
            const password = document.getElementById('newPass').value;
            const confirm_password = document.getElementById('confirmPass').value;

            const errEl = document.getElementById('formErr');
            errEl.style.display = 'none';

            if (!password) { errEl.textContent = 'Password tidak boleh kosong.'; errEl.style.display = 'block'; return; }
            if (password.length < 8) { errEl.textContent = 'Password minimal 8 karakter.'; errEl.style.display = 'block'; return; }
            if (password !== confirm_password) { errEl.textContent = 'Konfirmasi password tidak cocok.'; errEl.style.display = 'block'; return; }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spin"><i class="fa-solid fa-spinner"></i></span> Menyimpan...';

            try {
                const r = await fetch('/auth/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, confirm_password })
                });
                const d = await r.json();
                if (d.success) {
                    window.location.href = d.redirect;
                    return;
                }
                errEl.textContent = d.message;
                errEl.style.display = 'block';
            } catch (e) {
                errEl.textContent = 'Koneksi gagal. Pastikan server berjalan.';
                errEl.style.display = 'block';
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:8px"></i>Simpan Password &amp; Masuk';
        }

        document.getElementById('saveBtn').addEventListener('click', savePassword);
        document.getElementById('confirmPass').addEventListener('keydown', e => { if (e.key === 'Enter') savePassword(); });
    </script>
</body>

</html>
