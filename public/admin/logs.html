<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Logs — Al-Fityan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/admin.css" />
    <style>
        body {
            background: #0a0f1e;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh
        }
    </style>
</head>

<body>
    <aside
        class="w-56 bg-gray-900/90 border-r border-gray-800 flex flex-col flex-shrink-0 fixed left-0 top-0 bottom-0 z-40">
        <div class="p-5 border-b border-gray-800">
            <div class="flex items-center gap-2.5">
                <div
                    class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black">
                    AF</div>
                <div>
                    <div class="text-white font-bold text-sm">Al-Fityan</div>
                    <div class="text-gray-500 text-xs">Admin Panel</div>
                </div>
            </div>
            <div class="mt-3 px-2 py-1.5 bg-indigo-500/10 border border-indigo-500/20 rounded-lg">
                <div class="text-indigo-300 text-xs">Login sebagai:</div>
                <div id="currentUser" class="text-white text-sm font-bold">—</div>
            </div>
        </div>
        <nav class="flex-1 p-3 space-y-1">
            <a href="/admin/dashboard" class="sidebar-link"><i class="fa-solid fa-gauge"></i>Dashboard</a>
            <a href="/admin/students" class="sidebar-link"><i class="fa-solid fa-users"></i>Siswa</a>
            <a href="/admin/assignments" class="sidebar-link"><i class="fa-solid fa-book-open"></i>Tugas</a>
            <a href="/admin/grades" class="sidebar-link"><i class="fa-solid fa-star"></i>Nilai</a>
            <a href="/admin/forum" class="sidebar-link"><i class="fa-solid fa-comments"></i>Forum</a>
            <div class="space-y-1">
                <div class="text-gray-600 text-xs font-bold uppercase px-3 pt-3 pb-1">Owner Only</div>
                <a href="/admin/gallery" class="sidebar-link"><i class="fa-solid fa-images"></i>Gallery</a>
                <a href="/admin/logs" class="sidebar-link active"><i class="fa-solid fa-scroll"></i>Admin Logs</a>
                <a href="/admin/access" class="sidebar-link"><i class="fa-solid fa-key"></i>Access Manager</a>
            </div>
        </nav>
        <div class="p-3 border-t border-gray-800 space-y-1">
            <a href="/" target="_blank" class="sidebar-link"><i class="fa-solid fa-globe"></i>Lihat Website</a>
            <a href="/auth/logout" class="sidebar-link text-red-400"><i class="fa-solid fa-sign-out-alt"></i>Logout</a>
        </div>
    </aside>

    <main class="ml-56 flex-1 p-6">
        <div class="mb-6">
            <h1 class="text-2xl font-black text-white">📋 Admin Logs</h1>
            <p class="text-gray-400 text-sm">Semua aktivitas admin tercatat di sini (Owner only)</p>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-3 mb-4">
            <input id="searchLog" type="text" placeholder="Cari admin, aksi, atau target..." oninput="filter()"
                class="form-input w-64 text-sm" />
            <select id="filterAction" onchange="filter()" class="form-input w-40 text-sm">
                <option value="">Semua Aksi</option>
                <option>CREATE</option>
                <option>EDIT</option>
                <option>DELETE</option>
                <option>GRADE</option>
                <option>UPLOAD</option>
                <option>GENERATE_CODE</option>
            </select>
        </div>

        <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Admin</th>
                            <th>Aksi</th>
                            <th>Target</th>
                            <th>Detail</th>
                            <th>Waktu</th>
                        </tr>
                    </thead>
                    <tbody id="logsBody">
                        <tr>
                            <td colspan="6" class="text-center text-gray-500 py-8">Memuat...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const actionColors = { CREATE: 'rgba(16,185,129,.15)', EDIT: 'rgba(59,130,246,.15)', DELETE: 'rgba(239,68,68,.15)', GRADE: 'rgba(245,158,11,.15)', UPLOAD: 'rgba(139,92,246,.15)', GENERATE_CODE: 'rgba(6,182,212,.15)' };
        const actionTextColors = { CREATE: '#6ee7b7', EDIT: '#93c5fd', DELETE: '#f87171', GRADE: '#fcd34d', UPLOAD: '#c4b5fd', GENERATE_CODE: '#67e8f9' };
        let allLogs = [];

        function filter() {
            const q = document.getElementById('searchLog').value.toLowerCase();
            const action = document.getElementById('filterAction').value;
            const data = allLogs.filter(l =>
                (!q || l.admin_username.toLowerCase().includes(q) || (l.target || '').toLowerCase().includes(q) || l.action.toLowerCase().includes(q)) &&
                (!action || l.action === action)
            );
            renderLogs(data);
        }

        function renderLogs(data) {
            document.getElementById('logsBody').innerHTML = data.length ? data.map((l, i) => `
      <tr>
        <td class="text-gray-600">${i + 1}</td>
        <td><span class="font-bold text-indigo-400">${l.admin_username}</span></td>
        <td><span class="badge" style="background:${actionColors[l.action] || 'rgba(99,102,241,.15)'};color:${actionTextColors[l.action] || '#a78bfa'}">${l.action}</span></td>
        <td class="text-gray-300 text-sm">${l.target || '—'}</td>
        <td class="text-gray-500 text-xs max-w-[200px] truncate">${l.detail || ''}</td>
        <td class="text-gray-500 text-xs whitespace-nowrap">${l.created_at}</td>
      </tr>`).join('') : '<tr><td colspan="6" class="text-center text-gray-500 py-8">Tidak ada log.</td></tr>';
        }

        async function init() {
            const me = await (await fetch('/auth/me')).json();
            if (!me.user) return (window.location.href = '/login.html');
            if (me.user.role !== 'owner') return (window.location.href = '/admin/dashboard?error=forbidden');
            document.getElementById('currentUser').textContent = me.user.username + ' 👑';
            const r = await fetch('/admin/api/logs');
            allLogs = await r.json();
            renderLogs(allLogs);
        }
        init();
    </script>
</body>

</html>
