<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moderasi Forum — Admin Al-Fityan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/admin.css" />
    <style>
        body {
            background: #0a0f1e;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh
        }
    </style>
</head>

<body>
    <aside
        class="w-56 bg-gray-900/90 border-r border-gray-800 flex flex-col flex-shrink-0 fixed left-0 top-0 bottom-0 z-40">
        <div class="p-5 border-b border-gray-800">
            <div class="flex items-center gap-2.5">
                <div
                    class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black">
                    AF</div>
                <div>
                    <div class="text-white font-bold text-sm">Al-Fityan</div>
                    <div class="text-gray-500 text-xs">Admin Panel</div>
                </div>
            </div>
            <div class="mt-3 px-2 py-1.5 bg-indigo-500/10 border border-indigo-500/20 rounded-lg">
                <div class="text-indigo-300 text-xs">Login sebagai:</div>
                <div id="currentUser" class="text-white text-sm font-bold">—</div>
            </div>
        </div>
        <nav class="flex-1 p-3 space-y-1">
            <a href="/admin/dashboard" class="sidebar-link"><i class="fa-solid fa-gauge"></i>Dashboard</a>
            <a href="/admin/students" class="sidebar-link"><i class="fa-solid fa-users"></i>Siswa</a>
            <a href="/admin/assignments" class="sidebar-link"><i class="fa-solid fa-book-open"></i>Tugas</a>
            <a href="/admin/grades" class="sidebar-link"><i class="fa-solid fa-star"></i>Nilai</a>
            <a href="/admin/forum" class="sidebar-link active"><i class="fa-solid fa-comments"></i>Forum</a>
            <div id="ownerLinks" class="hidden space-y-1">
                <div class="text-gray-600 text-xs font-bold uppercase px-3 pt-3 pb-1">Owner Only</div>
                <a href="/admin/gallery" class="sidebar-link"><i class="fa-solid fa-images"></i>Gallery</a>
                <a href="/admin/logs" class="sidebar-link"><i class="fa-solid fa-scroll"></i>Admin Logs</a>
                <a href="/admin/access" class="sidebar-link"><i class="fa-solid fa-key"></i>Access Manager</a>
            </div>
        </nav>
        <div class="p-3 border-t border-gray-800 space-y-1">
            <a href="/" target="_blank" class="sidebar-link"><i class="fa-solid fa-globe"></i>Lihat Website</a>
            <a href="/auth/logout" class="sidebar-link text-red-400"><i class="fa-solid fa-sign-out-alt"></i>Logout</a>
        </div>
    </aside>

    <main class="ml-56 flex-1 p-6">
        <div class="mb-6">
            <h1 class="text-2xl font-black text-white">💬 Moderasi Forum</h1>
            <p class="text-gray-400 text-sm">Pantau dan hapus postingan atau balasan yang tidak pantas</p>
        </div>

        <div id="forumList" class="space-y-4">
            <div class="text-center py-12 text-gray-500"><i
                    class="fa-solid fa-spinner fa-spin text-2xl block mb-3"></i>Memuat forum...</div>
        </div>
    </main>

    <script>
        const avatarColors = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#3b82f6'];
        function getColor(n) { let h = 0; for (let c of n) h = (h * 31 + c.charCodeAt(0)) % avatarColors.length; return avatarColors[h]; }

        async function init() {
            const me = await (await fetch('/auth/me')).json();
            if (!me.user) return (window.location.href = '/login.html');
            document.getElementById('currentUser').textContent = me.user.username + (me.user.role === 'owner' ? ' 👑' : '');
            if (me.user.role === 'owner') document.getElementById('ownerLinks').classList.remove('hidden');
            await load();
        }

        async function load() {
            const r = await fetch('/api/forum');
            const posts = await r.json();
            if (!posts.length) { document.getElementById('forumList').innerHTML = '<div class="text-center py-12 text-gray-500">Belum ada postingan forum.</div>'; return; }

            const postEls = await Promise.all(posts.map(async p => {
                const rd = await fetch(`/api/forum/${p.id}`);
                const { replies } = await rd.json();
                return `
        <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden" id="post-${p.id}">
          <div class="p-4 flex items-start gap-3">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white font-bold text-sm flex-shrink-0" style="background:${getColor(p.author)}">${p.author[0]}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2 flex-wrap">
                <div>
                  <div class="font-bold text-white">${p.title}</div>
                  <div class="text-gray-500 text-xs">${p.author} · ${p.created_at} · ${p.reply_count} balasan</div>
                </div>
                <button onclick="deletePost(${p.id})" class="btn btn-danger text-xs py-1 px-3 flex-shrink-0"><i class="fa-solid fa-trash mr-1"></i>Hapus Thread</button>
              </div>
              <p class="text-gray-400 text-sm mt-2 line-clamp-2">${p.body}</p>
            </div>
          </div>
          ${replies.length ? `<div class="border-t border-gray-800">
            ${replies.map(reply => `
              <div class="flex items-start gap-3 p-3 pl-14 border-b border-gray-800/50" id="reply-${reply.id}">
                <div class="w-7 h-7 rounded-lg flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background:${getColor(reply.author)}">${reply.author[0]}</div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center justify-between gap-2">
                    <div class="font-semibold text-sm text-white">${reply.author} <span class="text-gray-500 font-normal text-xs">· ${reply.created_at}</span></div>
                    <button onclick="deleteReply(${reply.id})" class="btn btn-danger text-xs py-0.5 px-2"><i class="fa-solid fa-times"></i></button>
                  </div>
                  <p class="text-gray-400 text-xs mt-0.5">${reply.body}</p>
                </div>
              </div>`).join('')}
          </div>` : ''}
        </div>`;
            }));
            document.getElementById('forumList').innerHTML = postEls.join('');
        }

        async function deletePost(id) {
            if (!confirm('Hapus thread ini beserta semua balasannya?')) return;
            await fetch(`/admin/api/forum/posts/${id}`, { method: 'DELETE' });
            const el = document.getElementById(`post-${id}`);
            if (el) el.remove();
            showToast('Thread dihapus.', '#ef4444');
        }

        async function deleteReply(id) {
            if (!confirm('Hapus balasan ini?')) return;
            await fetch(`/admin/api/forum/replies/${id}`, { method: 'DELETE' });
            const el = document.getElementById(`reply-${id}`);
            if (el) el.remove();
            showToast('Balasan dihapus.', '#ef4444');
        }

        function showToast(msg, color) { const t = document.createElement('div'); t.className = 'toast-admin'; t.style.background = color; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        init();
    </script>
</body>

</html>
